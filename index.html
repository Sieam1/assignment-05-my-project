<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>
<link rel="icon" href="./assets/Aperture.png" type="image/png">

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>



</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

<div class="card w-96 bg-white shadow-xl p-6">

<div class="text-center">
<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
class="w-16 mx-auto mb-2">

<h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
<p class="text-gray-500 text-sm mb-6">Sign in to manage your issues</p>
</div>

<form id="loginForm">

<div class="form-control mb-3">
<label class="label font-semibold text-black">Username</label>
<input type="text" id="username" class="input input-bordered" placeholder="Enter Username">
<p class="text-xs text-blue-500 mt-1">Default: admin</p>
</div>

<div class="form-control mb-4">
<label class="label font-semibold text-black">Password</label>
<input type="password" id="password" class="input input-bordered" placeholder="Enter Password">
<p class="text-xs text-blue-500 mt-1">Default: admin123</p>
</div>

<button class="btn btn-primary w-full">Sign In</button>

</form>

<div class="text-center mt-4 text-sm text-gray-500">
OR
<p class="mt-2">
Username: <b>admin</b><br>
Password: <b>admin123</b>
</p>
</div>

</div>

<script src="js/login.js"></script>

</body>
</html>
