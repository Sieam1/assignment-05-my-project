<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issues Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-gray-100">

<!-- Navbar -->

<div class="navbar bg-white shadow px-6">

<div class="flex-1 flex items-center gap-2">

<img src="./assets/github-logo.png" class="w-8 h-8">

<h2 class="text-lg font-bold">
GitHub Issues Tracker
</h2>

</div>

<div class="flex gap-2">

<input id="searchInput"
type="text"
placeholder="Search issues..."
class="input input-bordered input-sm"/>

<button class="btn btn-primary btn-sm" onclick="searchIssues()">
Search
</button>

</div>

</div>

<!-- Tabs -->

<div class="p-6 border-shadow bg-white rounded-lg mx-6 mt-6">

<div class="tabs tabs-boxed w-fit mb-6 gap-2 ">

<button class="tab tab-active btn btn-primary w-20 h-8" onclick="loadIssues('all')">All</button>

<button class="tab btn w-20 h-8" onclick="loadIssues('open')">Open</button>

<button class="tab btn w-20 h-8" onclick="loadIssues('closed')">Closed</button>

</div>

<!-- Issue Count -->

<div class="flex justify-between items-center mb-6">

<div>
<h3 class="font-bold text-lg">
<span id="issueCount">0</span> Issues
</h3>
<p class="text-gray-500 text-sm">
Track and manage your project issues
</p>
</div>

<div class="flex gap-4 text-sm">

<div class="flex items-center gap-1">
<span class="w-3 h-3 bg-green-500 rounded-full"></span>
Open
</div>

<div class="flex items-center gap-1">
<span class="w-3 h-3 bg-purple-500 rounded-full"></span>
Closed
</div>

</div>

</div>

<!-- Issues Grid -->
<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
</div>

</div>

<!-- Modal -->

<dialog id="issueModal" class="modal">
<div class="modal-box">

<h3 id="modalTitle" class="font-bold text-lg"></h3>

<p id="modalDescription" class="py-4"></p>

<div class="modal-action">
<button class="btn" onclick="issueModal.close()">Close</button>
</div>

</div>
</dialog>

<script src="./js/api.js"></script>
<script src="./js/dashboard.js"></script>

</body>
</html>
